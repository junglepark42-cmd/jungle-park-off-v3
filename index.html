<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Jungle Park · OFF</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090c;--s1:#0f1117;--s2:#161a23;--s3:#1e2330;
  --bd:#252c3a;--bd2:#2e3648;
  --tx:#f0f2f8;--t2:#8892aa;--t3:#505a70;
  --ac:#4f8bff;--ac2:#6da0ff;
  --gr:#2dd4a0;--rd:#ff5c5c;--am:#ffb547;--pu:#9d7bff;--pk:#ff6bbd;
  --font:'Inter',sans-serif;--font2:'Syne',sans-serif;
  --r:12px;--r2:16px;--r3:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:var(--font);outline:none;-webkit-appearance:none}
input,select,textarea{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);color:var(--tx);font-size:14px;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:var(--s2)}
label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px}
.fi{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
button{cursor:pointer;transition:all .15s}
.btn{padding:11px 20px;border-radius:var(--r);border:none;font-size:14px;font-weight:600}
.btn-p{background:var(--ac);color:#fff}.btn-p:active{opacity:.85}
.btn-g{background:var(--s2);color:var(--tx);border:1.5px solid var(--bd)}.btn-g:active{background:var(--s3)}
.btn-d{background:rgba(255,92,92,.1);color:var(--rd);border:1.5px solid rgba(255,92,92,.2)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-xs{padding:5px 10px;font-size:12px}
.wf{width:100%}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:30px;font-size:11px;font-weight:700}
.tag-ac{background:rgba(79,139,255,.15);color:var(--ac2)}
.tag-gr{background:rgba(45,212,160,.15);color:var(--gr)}
.tag-rd{background:rgba(255,92,92,.15);color:var(--rd)}
.tag-am{background:rgba(255,181,71,.15);color:var(--am)}
.tag-pu{background:rgba(157,123,255,.15);color:var(--pu)}

/* ── LOGIN ── */
#sl{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(79,139,255,.08) 0%,transparent 70%)}
.lbox{width:100%;max-width:380px}
.lhero{text-align:center;margin-bottom:32px}
.lhero-icon{font-size:52px;margin-bottom:12px;display:block}
.lhero h1{font-family:var(--font2);font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.lhero p{font-size:13px;color:var(--t2)}
.lcard{background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--r3);padding:24px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.mbtn{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--tx);width:100%}
.mbtn.sel{border-color:var(--ac);background:rgba(79,139,255,.08)}
.mbtn:active{transform:scale(.97)}
.me{font-size:26px}
.mn{font-size:13px;font-weight:700;font-family:var(--font2)}
.mr{font-size:10px;color:var(--t2)}
.pin-row{display:flex;gap:8px}
#pin{flex:1;font-size:22px;font-weight:700;letter-spacing:10px;text-align:center}
.lerr{font-size:12px;color:var(--rd);text-align:center;min-height:18px;margin-top:8px}

/* ── APP ── */
#sa{display:none;flex-direction:column;min-height:100vh}
.bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:50}
.bar-logo{font-family:var(--font2);font-size:16px;font-weight:800;letter-spacing:-.5px}
.bar-logo span{color:var(--ac)}
.bar-right{display:flex;align-items:center;gap:10px}
.bar-user{font-size:13px;font-weight:600;color:var(--t2)}
.bar-quit{background:none;border:none;color:var(--t3);font-size:18px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pages{flex:1;padding-bottom:72px}
.page{display:none;padding:16px}
.page.on{display:block}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:3px;border:none;background:none;color:var(--t3);font-size:10px;font-weight:600;letter-spacing:.3px}
.ni.on{color:var(--ac)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── SECTIONS ── */
.sh{font-family:var(--font2);font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px}
.sh:first-child{margin-top:0}
.pgtitle{font-family:var(--font2);font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px}
.pgtitle em{color:var(--ac);font-style:normal}
.row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.row-hd .pgtitle{margin:0}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:8px}

/* ── KPIs ── */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.kpi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 12px}
.kv{font-family:var(--font2);font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.kl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500}

/* ── WEEK CAL ── */
.wcal{display:flex;flex-direction:column;gap:6px}
.wday{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.wday-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;gap:8px}
.wday-hd.tod{background:rgba(79,139,255,.05)}
.wday-name{font-family:var(--font2);font-size:13px;font-weight:700}
.wday-date{font-size:11px;color:var(--t2);font-weight:400}
.wday-bd{display:none;padding:2px 14px 12px}
.wday.op .wday-bd{display:block}
.wday.op .chev{transform:rotate(90deg)}
.chev{font-size:9px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.trow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.trow:last-child{border-bottom:none}
.tck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--bd2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tck.dn{background:var(--gr);border-color:var(--gr);color:#000;font-size:12px}
.ttx{flex:1;font-size:13px;font-weight:500}
.ttx.dn{text-decoration:line-through;color:var(--t3)}
.tassign{font-size:13px}
.tact{display:flex;gap:4px}
.tact button{background:none;border:none;font-size:14px;color:var(--t3);padding:0 2px}

/* ── TASK VIEW ── */
.tabs{display:flex;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:4px;gap:4px;margin-bottom:14px}
.tab{flex:1;padding:8px;border-radius:10px;border:none;background:none;font-size:13px;font-weight:600;color:var(--t2)}
.tab.on{background:var(--s3);color:var(--tx)}
.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wknav-lbl{font-family:var(--font2);font-size:13px;font-weight:700}
.wknav-btns{display:flex;gap:6px}
.wkbtn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--t2)}

/* ── PROJETS ── */
.pcard{background:var(--s1);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.pcard-hd{display:flex;align-items:center;padding:13px 14px;cursor:pointer;gap:10px}
.pcard-hd.op .pchev{transform:rotate(90deg)}
.pnm{font-family:var(--font2);font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmeta{font-size:11px;color:var(--t2);margin-top:2px}
.pbody{display:none;padding:0 14px 14px}
.pcard.op .pbody{display:block}
.pchev{font-size:9px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.miss{background:var(--s2);border-radius:10px;padding:12px;margin-bottom:6px;border:1px solid var(--bd)}
.miss.act{border-color:rgba(79,139,255,.25)}
.miss.dn{opacity:.5}
.miss-hd{display:flex;align-items:center;gap:10px}
.mn{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.mn-act{background:rgba(79,139,255,.2);color:var(--ac)}
.mn-dn{background:rgba(45,212,160,.2);color:var(--gr)}
.mn-lk{background:var(--s3);color:var(--t3)}
.mx{flex:1;font-size:13px;font-weight:500}
.mctrl{display:flex;flex-wrap:wrap;gap:6px;padding-left:34px;margin-top:8px}
.msel{font-size:12px;padding:5px 10px;border-radius:20px;border:none;font-family:var(--font);font-weight:600;cursor:pointer}
.mdate{font-size:12px;padding:5px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-family:var(--font)}
.mnote{width:100%;font-size:13px;padding:8px 12px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);resize:none;min-height:56px;line-height:1.5;margin-top:6px;font-family:var(--font)}
.bdone{background:rgba(45,212,160,.15);color:var(--gr);border:1px solid rgba(45,212,160,.3);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;font-family:var(--font)}
.breopen{background:none;border:1px solid var(--bd);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--t2);font-family:var(--font);margin-top:6px}
.prio-sep{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;padding:8px 0 6px}
.ctrow{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg);border-radius:8px;margin-bottom:3px;margin-left:34px;border:1px solid var(--bd)}
.ctsel{font-size:11px;padding:3px 8px;border-radius:12px;border:none;font-family:var(--font);font-weight:700;cursor:pointer}

/* ── CRM ── */
.fscroll{display:flex;overflow-x:auto;gap:6px;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.fscroll::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:30px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:12px;font-weight:600;white-space:nowrap}
.chip.on{border-color:var(--ac);background:rgba(79,139,255,.1);color:var(--ac)}
.prow{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.prow:active{background:var(--s2)}
.prow-inf{flex:1;min-width:0}
.prowname{font-family:var(--font2);font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prowmeta{font-size:11px;color:var(--t2);margin-top:2px}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── SHEET ── */
#sbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px)}
#sbg.on{display:block}
#sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-radius:24px 24px 0 0;border-top:1px solid var(--bd);z-index:201;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sheet.on{transform:none}
.shdrag{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 16px}
.shinfo{padding:0 16px 12px;border-bottom:1px solid var(--bd)}
.shname{font-family:var(--font2);font-size:20px;font-weight:800}
.shsub{font-size:12px;color:var(--t2);margin-top:2px}
.shbody{padding:14px 16px 32px}
.istat{background:var(--s2);border-radius:12px;padding:12px;border:1px solid var(--bd);margin-bottom:6px}
.istat-lbl{font-size:11px;font-weight:700;margin-bottom:4px}
.istat-val{font-family:var(--font2);font-size:24px;font-weight:800}
.istat-last{font-size:10px;color:var(--t2);margin-top:2px}
.irow{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s2);border-radius:10px;border:1px solid var(--bd);margin-bottom:4px}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── COM ── */
.pubrow{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:13px;margin-bottom:6px}
.pub-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pub-nm{font-family:var(--font2);font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pub-meta{font-size:11px;color:var(--t2);margin-top:1px}
.pub-edit{background:none;border:none;color:var(--t3);font-size:15px;padding:2px}
.pub-st{font-size:12px;padding:5px 12px;border-radius:20px;border:none;font-family:var(--font);font-weight:600;width:100%;cursor:pointer}
.objbox{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.objrow{margin-bottom:10px}.objrow:last-child{margin:0}
.objrow-hd{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px}
.prg{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.prgf{height:100%;border-radius:3px;transition:width .4s}
.daycol{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:6px;overflow:hidden}
.dayhd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.daylbl{font-family:var(--font2);font-size:13px;font-weight:700}
.plat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
.plat-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);background:none;color:var(--t2);font-size:13px;font-weight:600;font-family:var(--font);width:100%}
.plat-btn.on{border-color:var(--ac);background:rgba(79,139,255,.1);color:var(--ac)}
.who-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.who-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;border:1.5px solid var(--bd);background:none;color:var(--t2);font-size:13px;font-weight:600;font-family:var(--font)}
.who-btn.on{border-color:var(--ac);background:rgba(79,139,255,.1);color:var(--ac)}

/* ── MODALS ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:flex-end;backdrop-filter:blur(4px)}
.mo.on{display:flex}
.mbox{background:var(--s1);border-radius:24px 24px 0 0;border-top:1px solid var(--bd);width:100%;max-height:92vh;overflow-y:auto}
.mhdrag{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:12px auto 0}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.mtitle{font-family:var(--font2);font-size:17px;font-weight:800}
.mcls{width:28px;height:28px;border-radius:50%;background:var(--s2);border:none;color:var(--t2);font-size:16px;display:flex;align-items:center;justify-content:center}
.mbdy{padding:0 16px 8px}
.mft{padding:10px 16px 32px;display:flex;gap:8px}
.mft .btn{flex:1}

/* ── TOAST ── */
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.tst{background:var(--s2);border:1px solid var(--bd2);color:var(--tx);padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:tin .25s,tout .3s 2.2s forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-4px)}}
</style>

<style id="theme-override">
:root{
  --bg:#f4f7fb;
  --s1:#ffffff;
  --s2:#f7f9fc;
  --s3:#eef4ff;
  --bd:#dbe4f0;
  --bd2:#c9d7ea;
  --tx:#162033;
  --t2:#66758f;
  --t3:#94a0b3;
  --ac:#2f6fed;
  --ac2:#4c87f5;
  --gr:#18b67a;
  --rd:#df4d61;
  --am:#d98a13;
  --pu:#7b61ff;
  --pk:#e455a8;
  --font:'Inter',sans-serif;
  --font2:'Syne',sans-serif;
  --r:14px;
  --r2:18px;
  --r3:24px;
}
html,body{background:
  radial-gradient(circle at top left, rgba(47,111,237,.08), transparent 28%),
  radial-gradient(circle at top right, rgba(24,182,122,.08), transparent 22%),
  var(--bg)!important;color:var(--tx)!important}
body{line-height:1.35}
#sl{background:linear-gradient(180deg,#f8fbff 0%,#f1f5fb 100%)!important}
.lcard,.card,.kpi,.wday,.pcard,.prow,.pubrow,.daycol,.objbox,.istat,.irow,.miss,.ctrow,.tabs,.bar,.nav,.mbox,#sheet{box-shadow:0 8px 24px rgba(28,42,71,.06)!important}
.lcard,.card,.kpi,.wday,.pcard,.prow,.pubrow,.daycol,.objbox,.istat,.irow,.miss,.ctrow,.tabs,.mbox,#sheet{border-color:var(--bd)!important;background:var(--s1)!important}
.bar,.nav{background:rgba(255,255,255,.88)!important;backdrop-filter:blur(10px)!important}
.bar{border-bottom:1px solid rgba(201,215,234,.9)!important}
.nav{border-top:1px solid rgba(201,215,234,.9)!important}
.bar-logo{font-size:18px!important}
.bar-user{color:var(--t2)!important}
.bar-quit{background:#f2f6fc!important;color:#6c7b93!important}
.page{padding:18px 16px 20px!important}
.pgtitle{font-size:26px!important;letter-spacing:-.8px!important;color:#142033!important}
.pgtitle em{color:var(--ac)!important}
.sh,.kl,.wday-date,.pmeta,.prowmeta,.pub-meta,.shsub,.istat-last{color:var(--t2)!important}
.btn{border-radius:14px!important;box-shadow:none!important}
.btn-p{background:linear-gradient(135deg,#2f6fed 0%,#4d8cff 100%)!important;color:#fff!important}
.btn-g{background:#f7faff!important;color:#21324c!important;border:1.5px solid var(--bd)!important}
.btn-g:active{background:#edf3ff!important}
.btn-d{background:#fff2f4!important;border-color:#ffd8df!important;color:var(--rd)!important}
input,select,textarea{background:#fbfcfe!important;border-color:var(--bd)!important;color:var(--tx)!important;border-radius:14px!important}
input:focus,select:focus,textarea:focus{border-color:var(--ac)!important;box-shadow:0 0 0 4px rgba(47,111,237,.08)!important}
.mbtn{background:#fff!important;border-color:var(--bd)!important;color:var(--tx)!important;box-shadow:0 6px 18px rgba(28,42,71,.05)!important}
.mbtn.sel{border-color:var(--ac)!important;background:#eef4ff!important}
.tab{color:var(--t2)!important;border-radius:12px!important}
.tab.on{background:#edf3ff!important;color:var(--ac)!important}
.kv{font-size:32px!important}
.wday-hd.tod{background:#eef4ff!important}
.wday.op,.pcard.op{border-color:#c8dafc!important}
.trow{border-bottom:1px solid #edf2f8!important}
.tck{border-color:#c8d4e6!important;background:#fff!important}
.tck.dn{background:#dbf5eb!important;border-color:#8bdbbd!important;color:#0f5132!important}
.ttx.dn{color:#97a4b7!important}
.tag{font-weight:800!important}

<script>
// ══════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════
const SUPA='https://eyafmqvgxlaqskbwcrdq.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5YWZtcXZneGxhcXNrYndjcmRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTM1MzAsImV4cCI6MjA5MjA2OTUzMH0.t-as7f_AWwuytNzxzpXWpaZ9kK49bxn7f5TC1IOTWx8';

async function sGet(table,q){
  try{
    const r=await fetch(`${SUPA}/rest/v1/${table}${q||''}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    if(!r.ok)return[];
    const t=await r.text();return t?JSON.parse(t):[];
  }catch(e){return[];}
}

async function sSave(table,data){
  try{
    const r=await fetch(`${SUPA}/rest/v1/${table}?on_conflict=id`,{
      method:'POST',
      headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(data)
    });
    if(!r.ok){const t=await r.text();toast('❌ Erreur '+r.status+': '+t.slice(0,60));return false;}
    return true;
  }catch(e){toast('❌ Réseau: '+e.message);return false;}
}

async function sDel(table,id){
  try{await fetch(`${SUPA}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=minimal'}});}catch(e){}
}

// ══════════════════════════════════════════

const MEMBERS_FALLBACK=[

  {id:'ambre',prenom:'Ambre',pin:'3333',role:'Alternante',emoji:'👩‍🎓',c:'#9d7bff',actif:true,ordre:4}
];
const PIPE={prospect:{l:'Prospect',c:'#505a70'},contacte:{l:'Contacté',c:'#4f8bff'},attente:{l:'En attente',c:'#ffb547'},actif:{l:'Actif ✓',c:'#2dd4a0'},inactif:{l:'Inactif',c:'#ff5c5c'}};
const COMST={idee:{l:'💡 Idée',c:'#505a70'},creation:{l:'🎨 Création',c:'#4f8bff'},pret:{l:'✅ Prêt',c:'#2dd4a0'},programme:{l:'📅 Programmé',c:'#ffb547'},publie:{l:'🚀 Publié',c:'#2dd4a0'}};
const MST={en_cours:{l:'En cours',c:'#4f8bff',bg:'rgba(79,139,255,.15)'},bloque:{l:'🔴 Bloqué',c:'#ff5c5c',bg:'rgba(255,92,92,.15)'},fait:{l:'✓ Fait',c:'#2dd4a0',bg:'rgba(45,212,160,.15)'}};

let TASKS=[],PROJS=[],PARTS=[],PUBS=[];

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
const g=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>new Date().toISOString().slice(0,10);
const fmt=d=>d.getDate()+'/'+(d.getMonth()+1);
function toast(msg,d=2800){
  const el=g('toast');
  const div=document.createElement('div');
  div.className='tst';div.textContent=msg;
  el.appendChild(div);
  setTimeout(()=>div.remove(),d);
}
function om(id){g(id).classList.add('on');}
function cm(id){g(id).classList.remove('on');}
function wkdays(off){
  const n=new Date(),dw=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(dw===0?6:dw-1)+off*7);
  return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function wknum(d){return Math.floor((d-new Date(d.getFullYear(),0,1))/604800000);}
function fillSel(id,sel){
  const e=g(id);if(!e)return;
  e.innerHTML=MEMBERS.map(m=>`<option value="${m.id}"${m.id===sel?' selected':''}>${m.emoji} ${m.prenom}</option>`).join('');
}

// ══════════════════════════════════════════
// LOAD / SAVE DB
// ══════════════════════════════════════════
async function loadAll(){
  const [ta,pr,pa,pu]=await Promise.all([
    sGet('off_taches','?order=created_at'),
    sGet('off_projets','?order=created_at'),
    sGet('off_partenaires','?order=name'),
    sGet('off_publications','?order=date.desc')
  ]);
  TASKS=ta.map(t=>{
    let w=t.who||'herve';
    try{if(typeof w==='string'&&w.startsWith('['))w=JSON.parse(w);}catch(e){}
    if(!Array.isArray(w))w=[w];
    return{...t,who:w,type:t.type||'rec',dateExc:t.date_exc||null,weekRef:t.week_ref||0};
  });
  PROJS=pr.map(p=>({...p,hEst:p.heures_est||0,hReal:p.heures_real||0,missions:p.missions||[],depenses:p.depenses||[]}));
  PARTS=pa.map(p=>({...p,crmProjects:p.crm_projects||[],interactions:p.interactions||[]}));
  PUBS=pu.map(p=>({...p,desc:p.description||''}));
  try{const s=localStorage.getItem('jp_ts');if(s)TS=JSON.parse(s);}catch(e){}
}


async function loadMembers(){
  const ms=await sGet('off_membres','?actif=eq.true&order=ordre.asc');
  MEMBERS=(Array.isArray(ms)&&ms.length?ms:MEMBERS_FALLBACK).map((m,i)=>({
    id:m.id,
    prenom:m.prenom||'',
    pin:m.pin||'0000',
    role:m.role||'',
    emoji:m.emoji||'👤',
    c:m.c||'#4f8bff',
    actif:m.actif!==false,
    ordre:m.ordre||i+1
  }));
}

    ordre:m.ordre||0
  });

}

function tVis(t,di,ds,wn){
  if(t.type==='exc')return(t.dateExc||'')===ds;
  if(parseInt(t.day)!==di)return false;
  const f=t.freq||'hebdo';
  if(f==='hebdo')return true;
  if(f==='bi')return(wn-(t.weekRef||0))%2===0;
  const dom=new Date(ds).getDate(),wom=Math.ceil(dom/7);
  if(f==='m1')return wom===1;if(f==='m2')return wom===2;
  if(f==='m3')return wom===3;if(f==='m4')return wom===4;
  return true;
}
function mDone(m){return m.done||m.mstatus==='fait';}

function saveTask(){
  const name=g('t-name').value.trim();
  if(!name){toast('⚠️ Titre obligatoire');return;}

  }

function setMS(pid,mid,v){

  renderTasks();if(v==='bloque')toast('🔴 Mission bloquée');

}
function setMF(pid,mid,f,v){

}
function setCTS(pid,mid,ci,v){

function compM(pid,mid){

  m.done=true;m.date=td();m.mstatus='fait';
  renderTasks();renderHome();toast('✅ Mission complétée');dbProj(p);
}
function reopenM(pid,mid){

  m.done=false;m.date='';m.mstatus='en_cours';

}

function buildCom(){
  const obj=g('com-obj'),ct=g('com-ct');if(!obj||!ct)return;
  const days=wkdays(COMWK);
  const ds=days[0].toISOString().slice(0,10),de=days[6].toISOString().slice(0,10);
  let pubs=PUBS.filter(p=>p.date>=ds&&p.date<=de);
  if(COMPARK!=='all')pubs=pubs.filter(p=>(p.park||'jungle')===COMPARK||(p.park||'jungle')==='both');
  const parks=COMPARK==='all'?['jungle','sweety']:[COMPARK];
  obj.innerHTML=`<div class="objbox"><div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Objectif 3 pubs / parc / semaine</div>
    ${parks.map(pk=>{
      const n=pubs.filter(p=>{const v=p.park||'jungle';return v===pk||v==='both';}).length;
      const pct=Math.min(100,Math.round(n/3*100));
      const col=n>=3?'var(--gr)':n>=2?'var(--am)':'var(--rd)';
      return`<div class="objrow"><div class="objrow-hd"><span>${pk==='jungle'?'🌿 Jungle':'🍭 Sweety'}</span><span style="color:${col};font-weight:800">${n}/3</span></div><div class="prg"><div class="prgf" style="width:${pct}%;background:${col}"></div></div></div>`;
    }).join('')}
  </div>`;
  ct.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-family:var(--font2);font-size:13px;font-weight:700">${fmt(days[0])} – ${fmt(days[6])}</div>
    <div style="display:flex;gap:6px"><button class="wkbtn" onclick="COMWK--;renderCom()">‹</button><button class="wkbtn" onclick="COMWK++;renderCom()">›</button></div>
  </div>
  ${days.map((d,i)=>{
    const dstr=d.toISOString().slice(0,10),isT=dstr===td();
    const dp=pubs.filter(p=>p.date===dstr);
    return`<div class="daycol">
      <div class="dayhd${isT?' tod':''}">
        <div><span class="daylbl" style="${isT?'color:var(--ac)':''}">${DF[i]}</span> <span style="font-size:11px;color:var(--t2)">${fmt(d)}</span>${dp.length?` <span class="tag tag-ac">${dp.length}</span>`:''}</div>
        <button class="btn btn-g btn-xs" onclick="openPubDate('${dstr}')">+</button>
      </div>
      ${dp.length?`<div style="padding:0 14px 10px">${dp.map(p=>{const st=COMST[p.status]||COMST.idee;const plats=(p.platforms||[]).map(pl=>PLI[pl]||'').join('');return`<div class="pubrow"><div class="pub-top"><span style="font-size:16px">${PKI[p.park||'jungle']}</span>${plats?`<span style="font-size:13px">${plats}</span>`:''}<div style="flex:1;min-width:0"><div class="pub-nm">${p.name}</div><div class="pub-meta">${p.resp||''}${p.date?' · '+p.date:''}</div></div><button class="pub-edit" onclick="openEditPub('${p.id}')">✏️</button></div><select class="pub-st" style="color:${st.c}" onchange="setPubSt('${p.id}',this.value)">${Object.entries(COMST).map(([k,v])=>`<option value="${k}"${p.status===k?' selected':''}>${v.l}</option>`).join('')}</select></div>`;}).join('')}</div>`:''}
    </div>`;
  }).join('')}`;
}

function renderTeam(){
  const el=g('pg-team');if(!el)return;
  el.innerHTML=`<div class="row-hd"><div class="pgtitle"><em>👥</em> Équipe</div><button class="btn btn-p btn-sm" onclick="openAddMember()">+ Employé</button></div>
    ${MEMBERS.map(m=>{
      const ap=PROJS.filter(p=>p.who===m.id&&p.missions.some(x=>!mDone(x))).length;
      const bl=PROJS.filter(p=>p.who===m.id).reduce((a,p)=>a+p.missions.filter(x=>x.mstatus==='bloque').length,0);
      const ta=TASKS.filter(t=>{const w=Array.isArray(t.who)?t.who:[t.who];return w.includes(m.id);}).length;
      return`<div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:10px">
        <div style="width:56px;height:56px;border-radius:18px;background:${m.c}15;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid ${m.c}55;flex-shrink:0">${m.emoji}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><div style="font-family:var(--font2);font-size:15px;font-weight:800">${m.prenom}</div><span class="tag tag-ac" style="background:${m.c}15;color:${m.c}">${m.pin}</span></div>
          <div style="font-size:11px;color:var(--t2);margin-top:2px">${m.role||'Sans rôle'}</div>
          <div style="font-size:12px;margin-top:6px;display:flex;gap:10px;flex-wrap:wrap">
            <span style="color:var(--ac)">${ap} projet${ap!==1?'s':''}</span>
            <span style="color:var(--t3)">${ta} tâche${ta!==1?'s':''}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          ${bl?`<span class="tag tag-rd">⚠️ ${bl}</span>`:`<span class="tag tag-gr">OK</span>`}
          <button class="btn btn-g btn-xs" onclick="editMember('${m.id}')">✏️ Modifier</button>
        </div>
      </div>`;
    }).join('')}`;
}

function slugifyMemberName(v){
  return (v||'')
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .toLowerCase().trim()
    .replace(/[^a-z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'') || ('m_'+uid());
}

function openAddMember(){
  const prenom=prompt('Prénom ?');
  if(!prenom)return;
  const pin=prompt('Code PIN (4 chiffres) ?', '0000');
  if(pin===null)return;
  const role=prompt('Rôle ?', '');
  if(role===null)return;
  const emoji=prompt('Emoji ?', '👤');
  if(emoji===null)return;
  const color=prompt('Couleur hex ? (ex: #4f8bff)', '#4f8bff');
  if(color===null)return;
  let id=slugifyMemberName(prenom);
  if(MEMBERS.some(x=>x.id===id)) id=id+'_'+(MEMBERS.length+1);
  const m={id,prenom:prenom.trim(),pin:pin.trim()||'0000',role:(role||'').trim(),emoji:(emoji||'👤').trim()||'👤',c:(color||'#4f8bff').trim()||'#4f8bff',actif:true,ordre:MEMBERS.length+1};
  MEMBERS.push(m);
  renderLogin();renderTasks();renderCRM();renderCom();renderTeam();
  dbMember(m).then(ok=>toast(ok?'✅ Employé ajouté':'❌ Erreur sauvegarde employé'));
}

function editMember(id){
  const m=MEMBERS.find(x=>x.id===id); if(!m) return;
  const prenom=prompt('Prénom', m.prenom); if(prenom===null) return;
  const pin=prompt('Code PIN', m.pin); if(pin===null) return;
  const role=prompt('Rôle', m.role||''); if(role===null) return;
  const emoji=prompt('Emoji', m.emoji||'👤'); if(emoji===null) return;
  const color=prompt('Couleur hex', m.c||'#4f8bff'); if(color===null) return;
  m.prenom=prenom.trim()||m.prenom;
  m.pin=pin.trim()||m.pin;
  m.role=(role||'').trim();
  m.emoji=(emoji||'👤').trim()||'👤';
  m.c=(color||'#4f8bff').trim()||'#4f8bff';
  renderLogin();renderTasks();renderCRM();renderCom();renderTeam();
  dbMember(m).then(ok=>toast(ok?'✅ Employé modifié':'❌ Erreur sauvegarde employé'));
}

renderLogin();
</script>
